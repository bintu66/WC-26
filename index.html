<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e27" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Track FIFA World Cup 2026 live — interactive bracket, group standings, fixtures timeline, and elimination paths. Installable PWA for Android." />
    <meta name="keywords" content="FIFA, World Cup, 2026, live scores, bracket, fixtures, football, soccer" />
    
    <title>FIFA World Cup 2026 — Live Tracker</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <div id="app">
      <!-- Splash screen -->
      <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
          <div class="splash-logo">⚽</div>
          <h1 class="splash-title">WORLD CUP</h1>
          <p class="splash-subtitle">2026</p>
          <div class="splash-loader">
            <div class="splash-loader-bar"></div>
          </div>
          <div class="splash-developer">Developed by Bintu</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
